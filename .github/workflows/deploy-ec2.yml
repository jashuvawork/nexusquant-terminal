name: Deploy EC2 API

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Git branch to build and deploy
        required: true
        default: main
      skip_if_no_ssh:
        description: Skip (do not fail) when SSH secret is missing
        required: false
        default: "false"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ap-south-1
      EC2_HOST: 13.206.45.57
      EC2_USER: ubuntu
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Check deploy prerequisites
        id: prereq
        env:
          SSH_KEY: ${{ secrets.NEXUSQUANT_EC2_SSH_KEY }}
          SSH_KEY_B64: ${{ secrets.NEXUSQUANT_EC2_SSH_KEY_B64 }}
        run: |
          missing=()
          if [[ -z "${SSH_KEY}" && -z "${SSH_KEY_B64}" ]]; then
            missing+=("NEXUSQUANT_EC2_SSH_KEY or NEXUSQUANT_EC2_SSH_KEY_B64")
          fi
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "::error::Missing GitHub secrets: ${missing[*]}"
            echo "Add an EC2 SSH private key to repo secrets. On the instance, add the matching public key to ~/.ssh/authorized_keys for ubuntu."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            if [[ "${{ inputs.skip_if_no_ssh }}" != "true" ]]; then
              exit 1
            fi
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Package backend source
        if: steps.prereq.outputs.skip != 'true'
        run: |
          tar --exclude='backend/.venv' --exclude='**/__pycache__' -czf backend.tar.gz backend
          ls -lh backend.tar.gz

      - name: Write SSH key
        if: steps.prereq.outputs.skip != 'true'
        env:
          SSH_KEY: ${{ secrets.NEXUSQUANT_EC2_SSH_KEY }}
          SSH_KEY_B64: ${{ secrets.NEXUSQUANT_EC2_SSH_KEY_B64 }}
        run: |
          if [[ -n "${SSH_KEY_B64}" ]]; then
            printf '%s' "${SSH_KEY_B64}" | tr -d '\n' | base64 -d > ec2_key
          else
            printf '%s\n' "${SSH_KEY}" > ec2_key
          fi
          chmod 600 ec2_key
          ssh-keygen -y -f ec2_key >/dev/null

      - name: Upload and build on EC2
        if: steps.prereq.outputs.skip != 'true'
        run: |
          scp -i ec2_key -o StrictHostKeyChecking=no backend.tar.gz scripts/ec2-build-deploy.sh "${EC2_USER}@${EC2_HOST}:/tmp/"
          ssh -i ec2_key -o StrictHostKeyChecking=no "${EC2_USER}@${EC2_HOST}" \
            "set -euo pipefail
             rm -rf /tmp/nexusquant-backend
             mkdir -p /tmp/nexusquant-backend
             tar -xzf /tmp/backend.tar.gz -C /tmp --strip-components=1 backend
             chmod +x /tmp/ec2-build-deploy.sh
             sudo SOURCE_DIR=/tmp/nexusquant-backend /tmp/ec2-build-deploy.sh"

      - name: Verify public health
        if: steps.prereq.outputs.skip != 'true'
        run: |
          for i in $(seq 1 20); do
            code=$(curl -sS -o /tmp/health.json -w "%{http_code}" https://api.nexusquant.uk/health || true)
            echo "attempt ${i}: HTTP ${code}"
            if [[ "${code}" == "200" ]]; then
              cat /tmp/health.json
              exit 0
            fi
            sleep 5
          done
          echo "Public health still not 200" >&2
          exit 1
