name: Deploy EC2 API

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Git branch to build and deploy
        required: true
        default: cursor/persist-upstox-token-36ec

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      EC2_HOST: 13.206.45.57
      EC2_USER: ubuntu
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Check deploy prerequisites
        id: prereq
        env:
          SSH_KEY: ${{ secrets.NEXUSQUANT_EC2_SSH_KEY }}
          SSH_KEY_B64: ${{ secrets.NEXUSQUANT_EC2_SSH_KEY_B64 }}
        run: |
          if [[ -z "${SSH_KEY}" && -z "${SSH_KEY_B64}" ]]; then
            echo "::error::Missing NEXUSQUANT_EC2_SSH_KEY or NEXUSQUANT_EC2_SSH_KEY_B64 in repo secrets."
            exit 1
          fi
          echo "deploy_skip=false" >> "$GITHUB_OUTPUT"

      - name: Package backend source
        run: |
          tar --exclude='backend/.venv' --exclude='**/__pycache__' -czf backend.tar.gz backend
          ls -lh backend.tar.gz

      - name: Write SSH key
        id: sshkey
        env:
          SSH_KEY: ${{ secrets.NEXUSQUANT_EC2_SSH_KEY }}
          SSH_KEY_B64: ${{ secrets.NEXUSQUANT_EC2_SSH_KEY_B64 }}
        run: bash scripts/gha-write-ec2-key.sh ec2_key

      - name: Test EC2 SSH
        id: sshconn
        if: steps.sshkey.outputs.deploy_skip != 'true'
        run: |
          if ! ssh -i ec2_key -o BatchMode=yes -o StrictHostKeyChecking=no -o ConnectTimeout=20 "${EC2_USER}@${EC2_HOST}" 'echo ok'; then
            echo "::error::EC2 SSH auth failed — replace NEXUSQUANT_EC2_SSH_KEY_B64 (see scripts/generate-gha-deploy-key.sh)."
            exit 1
          fi

      - name: Upload and build on EC2
        if: steps.sshkey.outputs.deploy_skip != 'true' && steps.sshconn.outputs.deploy_skip != 'true'
        run: |
          scp -i ec2_key -o StrictHostKeyChecking=no backend.tar.gz scripts/ec2-build-deploy.sh "${EC2_USER}@${EC2_HOST}:/tmp/"
          ssh -i ec2_key -o StrictHostKeyChecking=no "${EC2_USER}@${EC2_HOST}" \
            "set -euo pipefail
             rm -rf /tmp/nexusquant-backend
             mkdir -p /tmp/nexusquant-backend
             tar -xzf /tmp/backend.tar.gz -C /tmp --strip-components=1 backend
             chmod +x /tmp/ec2-build-deploy.sh
             sudo SOURCE_DIR=/tmp/nexusquant-backend /tmp/ec2-build-deploy.sh"

      - name: Verify public health
        if: steps.sshkey.outputs.deploy_skip != 'true' && steps.sshconn.outputs.deploy_skip != 'true'
        run: |
          for i in $(seq 1 20); do
            code=$(curl -sS -o /tmp/health.json -w "%{http_code}" https://api.nexusquant.uk/health || true)
            echo "attempt ${i}: HTTP ${code}"
            if [[ "${code}" == "200" ]]; then
              cat /tmp/health.json
              exit 0
            fi
            sleep 5
          done
          echo "Public health still not 200" >&2
          exit 1
