name: Pause EC2 (stop NexusQuant API)

on:
  workflow_dispatch:
    inputs:
      stop_instance:
        description: Also stop the EC2 instance (full AWS pause)
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

jobs:
  pause:
    runs-on: ubuntu-latest
    env:
      EC2_HOST: [REDACTED]
      EC2_USER: ubuntu
      EC2_INSTANCE_ID: i-09ce535a67a0a6810
      AWS_REGION: [REDACTED]
      STOP_EC2_INSTANCE: ${{ inputs.stop_instance }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: [REDACTED]

      - name: Pause API container and optional EC2 stop
        env:
          SSH_KEY: ${{ secrets.NEXUSQUANT_EC2_SSH_KEY }}
          SSH_KEY_B64: ${{ secrets.NEXUSQUANT_EC2_SSH_KEY_B64 }}
        run: |
          chmod +x scripts/gha-ec2-pause.sh scripts/ec2-pause-all.sh scripts/gha-write-ec2-key.sh
          bash scripts/gha-ec2-pause.sh

      - name: Verify API is down
        run: |
          code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 15 https://api.nexusquant.uk/health || echo "000")
          echo "public health HTTP ${code}"
          if [[ "${code}" == "200" ]]; then
            echo "WARNING: API still responding after pause" >&2
            exit 1
          fi
          echo "API is down (expected)"
