name: NexusQuant CI

on:
  push:
    branches: [main, "cursor/**"]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: python -m compileall app
      - run: python -c "from app.main import app; print('app import ok:', app.title)"

  deploy-ec2:
    needs: backend
    if: false  # paused — re-enable after removing /opt/nexusquant/PAUSED on EC2
    runs-on: ubuntu-latest
    env:
      EC2_HOST: 13.206.45.57
      EC2_USER: ubuntu
      EC2_INSTANCE_ID: i-09ce535a67a0a6810
      AWS_REGION: ap-south-1
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Package backend source
        run: |
          tar --exclude='backend/.venv' --exclude='**/__pycache__' -czf backend.tar.gz backend
          ls -lh backend.tar.gz

      - name: Deploy to EC2
        env:
          SSH_KEY: ${{ secrets.NEXUSQUANT_EC2_SSH_KEY }}
          SSH_KEY_B64: ${{ secrets.NEXUSQUANT_EC2_SSH_KEY_B64 }}
        run: |
          chmod +x scripts/gha-ec2-deploy.sh scripts/ec2-sync-trading-env.sh scripts/gha-write-ec2-key.sh
          bash scripts/gha-ec2-deploy.sh

      - name: Verify public health
        run: |
          for i in $(seq 1 20); do
            code=$(curl -sS -o /tmp/health.json -w "%{http_code}" https://api.nexusquant.uk/health || true)
            echo "attempt ${i}: HTTP ${code}"
            if [[ "${code}" == "200" ]]; then
              cat /tmp/health.json
              exit 0
            fi
            sleep 5
          done
          echo "Public health still not 200" >&2
          exit 1
