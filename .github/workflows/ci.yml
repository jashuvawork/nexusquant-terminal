name: NexusQuant CI

on:
  push:
    branches: [main, "cursor/**"]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: python -m compileall app

  deploy-ec2:
    needs: backend
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/cursor/'))
    runs-on: ubuntu-latest
    env:
      EC2_HOST: 13.206.45.57
      EC2_USER: ubuntu
    steps:
      - uses: actions/checkout@v4

      - name: Check deploy prerequisites
        id: prereq
        env:
          SSH_KEY: ${{ secrets.NEXUSQUANT_EC2_SSH_KEY }}
          SSH_KEY_B64: ${{ secrets.NEXUSQUANT_EC2_SSH_KEY_B64 }}
        run: |
          if [[ -z "${SSH_KEY}" && -z "${SSH_KEY_B64}" ]]; then
            echo "::warning::Skipping EC2 deploy — add NEXUSQUANT_EC2_SSH_KEY (or _B64) to GitHub repo secrets."
            echo "deploy_skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Package backend source
        if: steps.prereq.outputs.deploy_skip != 'true'
        run: |
          tar --exclude='backend/.venv' --exclude='**/__pycache__' -czf backend.tar.gz backend
          ls -lh backend.tar.gz

      - name: Write SSH key
        id: sshkey
        if: steps.prereq.outputs.deploy_skip != 'true'
        env:
          SSH_KEY: ${{ secrets.NEXUSQUANT_EC2_SSH_KEY }}
          SSH_KEY_B64: ${{ secrets.NEXUSQUANT_EC2_SSH_KEY_B64 }}
        run: bash scripts/gha-write-ec2-key.sh ec2_key

      - name: Upload and build on EC2
        if: steps.prereq.outputs.deploy_skip != 'true' && steps.sshkey.outputs.deploy_skip != 'true'
        run: |
          scp -i ec2_key -o StrictHostKeyChecking=no backend.tar.gz scripts/ec2-build-deploy.sh "${EC2_USER}@${EC2_HOST}:/tmp/"
          ssh -i ec2_key -o StrictHostKeyChecking=no "${EC2_USER}@${EC2_HOST}" \
            "set -euo pipefail
             rm -rf /tmp/nexusquant-backend
             mkdir -p /tmp/nexusquant-backend
             tar -xzf /tmp/backend.tar.gz -C /tmp --strip-components=1 backend
             chmod +x /tmp/ec2-build-deploy.sh
             sudo SOURCE_DIR=/tmp/nexusquant-backend /tmp/ec2-build-deploy.sh"

      - name: Verify public health
        if: steps.prereq.outputs.deploy_skip != 'true' && steps.sshkey.outputs.deploy_skip != 'true'
        run: |
          for i in $(seq 1 20); do
            code=$(curl -sS -o /tmp/health.json -w "%{http_code}" https://api.nexusquant.uk/health || true)
            echo "attempt ${i}: HTTP ${code}"
            if [[ "${code}" == "200" ]]; then
              cat /tmp/health.json
              exit 0
            fi
            sleep 5
          done
          echo "Public health still not 200" >&2
          exit 1
