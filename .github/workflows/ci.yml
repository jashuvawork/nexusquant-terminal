name: NexusQuant CI

on:
  push:
    branches: [main, "cursor/**"]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: python -m compileall app

  deploy-ec2:
    needs: backend
    if: github.ref == 'refs/heads/cursor/persist-upstox-token-36ec' && github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ap-south-1
      ECR_REPOSITORY: nexusquant-api
      ACCOUNT_ID: "939198471076"
      EC2_HOST: 13.206.45.57
      EC2_USER: ubuntu
      IMAGE_TAG: latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          IMAGE_URI="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:${IMAGE_TAG}"
          docker build -t "${ECR_REPOSITORY}:${IMAGE_TAG}" ./backend
          docker tag "${ECR_REPOSITORY}:${IMAGE_TAG}" "${IMAGE_URI}"
          docker push "${IMAGE_URI}"
          echo "Pushed ${IMAGE_URI}"

      - name: Write SSH key
        env:
          SSH_KEY: ${{ secrets.NEXUSQUANT_EC2_SSH_KEY }}
          SSH_KEY_B64: ${{ secrets.NEXUSQUANT_EC2_SSH_KEY_B64 }}
        run: |
          if [[ -n "${SSH_KEY_B64}" ]]; then
            printf '%s' "${SSH_KEY_B64}" | tr -d '\n' | base64 -d > ec2_key
          elif [[ -n "${SSH_KEY}" ]]; then
            printf '%s\n' "${SSH_KEY}" > ec2_key
          else
            echo "Missing NEXUSQUANT_EC2_SSH_KEY or NEXUSQUANT_EC2_SSH_KEY_B64 secret" >&2
            exit 1
          fi
          chmod 600 ec2_key
          ssh-keygen -y -f ec2_key >/dev/null

      - name: Redeploy on EC2
        run: |
          scp -i ec2_key -o StrictHostKeyChecking=no scripts/ec2-redeploy.sh "${EC2_USER}@${EC2_HOST}:/tmp/ec2-redeploy.sh"
          ssh -i ec2_key -o StrictHostKeyChecking=no "${EC2_USER}@${EC2_HOST}" \
            "chmod +x /tmp/ec2-redeploy.sh && sudo AWS_REGION=${AWS_REGION} ACCOUNT_ID=${ACCOUNT_ID} IMAGE_TAG=${IMAGE_TAG} /tmp/ec2-redeploy.sh"

      - name: Verify public health
        run: |
          for i in $(seq 1 20); do
            code=$(curl -sS -o /tmp/health.json -w "%{http_code}" https://api.nexusquant.uk/health || true)
            echo "attempt ${i}: HTTP ${code}"
            if [[ "${code}" == "200" ]]; then
              cat /tmp/health.json
              exit 0
            fi
            sleep 5
          done
          echo "Public health still not 200" >&2
          exit 1
