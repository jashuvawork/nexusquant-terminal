services:
  - type: web
    name: nexusquant-api
    runtime: docker
    rootDir: backend
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: nexusquant-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: nexusquant-redis
          property: connectionString
      - key: UPSTOX_API_KEY
        sync: false
      - key: UPSTOX_API_SECRET
        sync: false
      - key: UPSTOX_REDIRECT_URI
        sync: false

  - type: redis
    name: nexusquant-redis
    plan: starter
    ipAllowList: []

databases:
  - name: nexusquant-postgres
    plan: starter
