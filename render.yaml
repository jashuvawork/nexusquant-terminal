services:
  - type: web
    name: nexusquant-api
    runtime: docker
    rootDir: backend
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: nexusquant-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: nexusquant-redis
          property: connectionString
      - key: UPSTOX_API_KEY
        sync: false
      - key: UPSTOX_API_SECRET
        sync: false
      - key: UPSTOX_REDIRECT_URI
        sync: false
      - key: PRIMARY_SYMBOL
        value: NIFTY
      - key: NIFTY_INSTRUMENT_KEY
        value: NSE_INDEX|Nifty 50
      - key: SENSEX_INSTRUMENT_KEY
        value: BSE_INDEX|SENSEX
      - key: NIFTY_EXPIRY_DATE
        sync: false
      - key: SENSEX_EXPIRY_DATE
        sync: false
      - key: ENABLE_LIVE_TRADING
        value: false
      - key: AGGRESSIVE_MODE
        value: false
      - key: MARKET_POLL_SECONDS
        value: 1

  - type: redis
    name: nexusquant-redis
    plan: starter
    ipAllowList: []

databases:
  - name: nexusquant-postgres
    plan: basic-256mb
